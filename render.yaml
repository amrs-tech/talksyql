services:
  - type: web
    name: talksyql
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: talksyql-db
          property: connectionString
      - key: TALKSYQL_SECRET
        generateValue: true
      - key: TALKSYQL_ADMIN_EMAIL
        sync: false
      - key: TALKSYQL_ADMIN_PASSWORD
        sync: false

databases:
  - name: talksyql-db
    databaseName: talksyql
    plan: free
